<!DOCTYPE html>
<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            body {
                margin: 0;
                font-family: sans-serif;
                user-select: none;
            }
            .container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center; /* 水平置中 */
                background-color: #bdaa90;
            }
            .tittle {
                width: 80%;
                margin-top: 2em;
                max-width: 600px;
            }
            .cat-img {
                width: 100%;
                flex: 1;
                max-width: 800px;
                text-align: center;
                color: #ffffff;
                font-size: 80px;
                -webkit-text-stroke: 3px #000000;
            }
            #p {
                background-image: url("imgs/p.png");
                background-position: bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }
            #op {
                background-image: url("imgs/op.png");
                background-position: bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img class="tittle" src="imgs/popcat.svg" alt="POPCAT CLASSIC">
            <div class="cat-img" id="p">0</div>
        </div>
        <script>  
            let count = 0;
            let catImg = document.getElementById("p");
            function addCount() {
                count++;
                catImg.innerHTML = count;
                catImg.id = "op";
            }

            let close = () => {
                catImg.id = "p";
            }

            document.addEventListener("pointerdown", addCount);
            document.addEventListener("pointerup", close);
        </script>
    </body>
</html>
